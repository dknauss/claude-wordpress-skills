name: Bug report
description: Report incorrect skill guidance, packaging, or workflow problems.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Name the skill, install path, or workflow involved.
      placeholder: wp-performance-review, plugin manifest, CI workflow
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction details
      description: Include prompts, file paths, commands, or logs.
